name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  macos:
    name: Build & test (macOS)
    runs-on: macos-14
    defaults:
      run:
        working-directory: osx
    steps:
      - uses: actions/checkout@v4
      # The code uses Swift 6.0 compiler features (e.g. @preconcurrency on a conformance, SE-0423),
      # so pin the newest stable Xcode. The macos-14 default Xcode (15.x / Swift 5.10) rejects them.
      - name: Select Xcode (Swift 6 toolchain)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  macos-lint:
    name: Format lint
    runs-on: macos-14
    defaults:
      run:
        working-directory: osx
    steps:
      - uses: actions/checkout@v4
      - name: Install swift-format
        run: brew install swift-format
      - name: Lint
        run: swift-format lint --recursive --strict Sources Tests

  windows-core:
    name: Build & test (Windows Core)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore Core Tests
        run: dotnet restore tests/AutoSwitchKVM.Core.Tests/AutoSwitchKVM.Core.Tests.csproj
      - name: Test Core
        run: dotnet test tests/AutoSwitchKVM.Core.Tests/AutoSwitchKVM.Core.Tests.csproj -c Release
      - name: Restore App
        run: dotnet restore src/AutoSwitchKVM.App/AutoSwitchKVM.App.csproj -p:Platform=x64
      - name: Build App
        run: dotnet build src/AutoSwitchKVM.App/AutoSwitchKVM.App.csproj -c Release -p:Platform=x64 --no-restore
